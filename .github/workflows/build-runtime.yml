name: Build Runtime Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.3.2)"
        required: false
        default: ""
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14         # Apple Silicon
            platform: darwin
            arch: arm64
          - os: macos-13         # Intel Mac
            platform: darwin
            arch: x64
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "release" ]; then
            # Strip 'v' prefix from tag
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(python -c 'from box_agent import __version__; print(__version__)')" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build runtime
        run: |
          python scripts/build_runtime.py \
            --version ${{ steps.version.outputs.version }} \
            --output dist/runtime

      - name: Verify artifact
        run: |
          cd dist/runtime
          tar xzf box-agent-runtime-*.tar.gz
          echo "=== Directory structure ==="
          find box-agent-runtime -type f | head -20
          echo "=== manifest.json ==="
          cat box-agent-runtime/manifest.json
          echo "=== VERSION ==="
          cat box-agent-runtime/VERSION
          echo "=== Entry point exists ==="
          ENTRY=$(python3 -c "import json; print(json.load(open('box-agent-runtime/manifest.json'))['entry'])")
          test -f "box-agent-runtime/$ENTRY" && echo "OK: $ENTRY exists" || (echo "FAIL: $ENTRY missing" && exit 1)
          test -x "box-agent-runtime/$ENTRY" && echo "OK: $ENTRY is executable" || (echo "FAIL: $ENTRY not executable" && exit 1)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: box-agent-runtime-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/runtime/box-agent-runtime-*.tar.gz

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/runtime/box-agent-runtime-*.tar.gz \
            --clobber
